[profile.default]

src     = "src"
out     = "out"
libs    = ["lib"]
solc    = "0.8.20"

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/"
]

verbosity = 3

[rpc_endpoints]
celo = "${CELO_RPC_URL}"
alfajores = "${ALFAJORES_RPC_URL}"

[etherscan]
celo      = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
alfajores = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api" }

[fuzz]
runs = 1000
seed = "0xdead"

# Add these lines:
via_ir    = true
optimizer = true
optimizer_runs = 200
